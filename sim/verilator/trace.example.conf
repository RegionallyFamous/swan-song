# Structured trace settings. Paths are relative to the repository working directory.
output = build/sim/text-renderer.jsonl
format = jsonl
events = cpu,bank,vram

# Optional inclusive 20-bit physical-PC filter for cpu events only.
# cpu_pc = 0x80000-0x8ffff

# Optional VRAM filters. Addresses accept comma-separated singletons and
# inclusive ranges. Address and role filters combine with AND.
# vram_address = 0x2000-0x3fff
# vram_role = screen1_map,screen1_tile
