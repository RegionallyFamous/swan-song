# Structured trace settings. Paths are relative to the repository working directory.
# CSV is required by the standalone verifiers/correlators. Use JSONL only for
# exploratory logging that will not feed the confirmation-grade workflow.
output = build/sim/text-renderer.csv
format = csv
events = cpu,bank,vram,mem,bg_cell,sprite_row

# Optional inclusive 20-bit physical-PC filter for cpu events only.
# cpu_pc = 0x80000-0x8ffff

# Optional VRAM filters. Addresses accept comma-separated singletons and
# inclusive ranges. Address and role filters combine with AND.
# vram_address = 0x2000-0x3fff
# vram_role = screen1_map,screen1_tile

# Optional completed-memory filters. Different filters combine with AND.
# mem_initiator = cpu,gdma,sdma
# mem_access = read,write
# mem_address = 0x00000-0xfffff
# mem_space = iram,cart_rom_linear
# mem_offset = 0x000000-0xffffff
# mem_origin = exact,not_applicable
# origin_pc = 0x80000-0x8ffff
