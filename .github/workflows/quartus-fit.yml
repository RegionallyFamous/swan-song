name: Quartus fit candidate
run-name: Quartus fit candidate ${{ inputs.lab_nonce }}

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Candidate signoff or restricted connectivity-policy refresh
        required: true
        default: candidate
        type: choice
        options:
          - candidate
          - connectivity-refresh
      connectivity_refresh_sha:
        description: Exact commit required for the restricted connectivity-refresh profile
        required: false
        type: string
      lab_nonce:
        description: Required fresh 32-character lowercase-hex JIT runner identity
        required: true
        type: string

permissions:
  contents: read
  actions: read

env:
  VERILATOR_IMAGE: verilator/verilator@sha256:c531ae1e5da8e7293a2bd6793060c2bf484dac358746e69bcc3e689ec265b299
  GHDL_IMAGE: ghdl/ghdl@sha256:8b3ec37c3873b2eee9387759e66c50830c15ae5b7b533badaa97ce007a0f8022
  QUARTUS_IMAGE: swan-song-quartus:21.1.1-850-cyclonev

concurrency:
  group: quartus-fit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fit:
    if: >-
      ${{
        github.repository == 'RegionallyFamous/swan-song' &&
        github.event_name == 'workflow_dispatch' &&
        github.ref_type == 'branch' &&
        github.workflow_sha == github.sha &&
        github.actor_id == '158918' &&
        github.triggering_actor == 'nickhamze' &&
        inputs.lab_nonce != '' &&
        (
          (inputs.profile == 'candidate' &&
            inputs.connectivity_refresh_sha == '' &&
            github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) ||
          (inputs.profile == 'connectivity-refresh' &&
            startsWith(github.ref, 'refs/heads/codex/connectivity-refresh-') &&
            github.sha == inputs.connectivity_refresh_sha)
        )
      }}
    environment: ${{ inputs.profile == 'candidate' && 'quartus-fit' || 'quartus-connectivity-refresh' }}
    runs-on:
      - self-hosted
      - linux
      - x64
      - swan-song-quartus-21-1-1
      - "swan-song-job-${{ inputs.lab_nonce }}"
    timeout-minutes: 180
    env:
      CXX: ${{ github.workspace }}/.github/toolchain/cxx
    steps:
      - name: Require capable x86_64 guest and local Docker daemon
        shell: bash
        env:
          SWAN_SONG_JOB_NONCE: ${{ inputs.lab_nonce }}
        run: |
          set -euo pipefail
          if [[ ! "$SWAN_SONG_JOB_NONCE" =~ ^[0-9a-f]{32}$ ]]; then
            echo "lab_nonce must be exactly 32 lowercase hexadecimal characters" >&2
            exit 1
          fi
          readonly minimum_cpus=8
          readonly minimum_memory_kib=$((30 * 1024 * 1024))
          readonly minimum_free_disk_kib=$((80 * 1024 * 1024))
          operating_system="$(uname -s)"
          architecture="$(uname -m)"
          if [[ "$operating_system" != Linux ]]; then
            echo "Quartus fit runner must use Linux, got $operating_system" >&2
            exit 1
          fi
          if [[ "$architecture" != x86_64 ]]; then
            echo "Quartus fit runner guest must report x86_64, got $architecture" >&2
            exit 1
          fi
          for command in docker nproc awk df make python3 tclsh perl cmp find sed grep sha256sum; do
            if ! command -v "$command" >/dev/null; then
              echo "Quartus fit runner is missing required command: $command" >&2
              exit 1
            fi
          done
          if [[ -z "${RUNNER_TEMP:-}" || ! -d "$RUNNER_TEMP" ]]; then
            echo "RUNNER_TEMP must name an existing directory" >&2
            exit 1
          fi
          cpu_count="$(nproc)"
          memory_kib="$(awk '/^MemTotal:/ { print $2; exit }' /proc/meminfo)"
          runner_free_kib="$(df -Pk "$RUNNER_TEMP" | awk 'NR == 2 { print $4; exit }')"
          if (( cpu_count < minimum_cpus )); then
            echo "Quartus fit runner needs at least $minimum_cpus CPUs, got $cpu_count" >&2
            exit 1
          fi
          if [[ -z "$memory_kib" ]] || (( memory_kib < minimum_memory_kib )); then
            echo "Quartus fit runner needs at least 30 GiB detected RAM" >&2
            exit 1
          fi
          if [[ ! "$runner_free_kib" =~ ^[0-9]+$ ]] \
              || (( runner_free_kib < minimum_free_disk_kib )); then
            echo "Quartus fit runner needs at least 80 GiB free at RUNNER_TEMP" >&2
            exit 1
          fi
          if ! docker info >/dev/null; then
            echo "Quartus fit runner cannot reach the Docker daemon" >&2
            exit 1
          fi
          docker_os="$(docker info --format '{{.OSType}}')"
          docker_architecture="$(docker info --format '{{.Architecture}}')"
          docker_driver="$(docker info --format '{{.Driver}}')"
          if [[ "$docker_os" != linux ]]; then
            echo "Docker daemon must run Linux containers, got $docker_os" >&2
            exit 1
          fi
          if [[ "$docker_architecture" != x86_64 && "$docker_architecture" != amd64 ]]; then
            echo "Docker daemon must report x86_64, got $docker_architecture" >&2
            exit 1
          fi
          if [[ -n "${DOCKER_CONTEXT:-}" ]]; then
            docker_context="$(docker context show)"
            docker_endpoint="$(docker context inspect \
              --format '{{ (index .Endpoints "docker").Host }}' "$docker_context")"
          elif [[ -n "${DOCKER_HOST:-}" ]]; then
            docker_endpoint="$DOCKER_HOST"
          else
            docker_context="$(docker context show)"
            docker_endpoint="$(docker context inspect \
              --format '{{ (index .Endpoints "docker").Host }}' "$docker_context")"
          fi
          if [[ "$docker_endpoint" != unix:///* ]]; then
            echo "Docker must use a local Unix-socket endpoint, got $docker_endpoint" >&2
            exit 1
          fi
          image_id="$(docker image inspect --format '{{.Id}}' "$QUARTUS_IMAGE")"
          if [[ ! "$image_id" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Quartus image has an invalid immutable ID: $image_id" >&2
            exit 1
          fi
          docker_free_kib="$(docker run --rm \
            --platform linux/amd64 \
            --network none \
            --user 0:0 \
            --entrypoint /bin/df \
            "$image_id" -Pk / | awk 'NR == 2 { print $4; exit }')"
          if [[ ! "$docker_free_kib" =~ ^[0-9]+$ ]] \
              || (( docker_free_kib < minimum_free_disk_kib )); then
            echo "Quartus fit runner needs at least 80 GiB free for the Docker container layer" >&2
            exit 1
          fi
          echo "guest preflight: $cpu_count CPUs, $memory_kib KiB RAM, " \
            "$runner_free_kib KiB RUNNER_TEMP free, $docker_free_kib KiB " \
            "container-layer free ($docker_driver, $image_id)"
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Verify exact-commit hosted regression success
        if: ${{ inputs.profile == 'candidate' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/verify_hosted_regression.py
          --repository "$GITHUB_REPOSITORY"
          --sha "$GITHUB_SHA"
          --branch "$GITHUB_REF_NAME"
      - name: Prepare empty artifact and evidence directories
        shell: bash
        run: |
          artifact_dir="$(mktemp -d "$RUNNER_TEMP/quartus-fit.XXXXXX")"
          evidence_dir="$(mktemp -d "$RUNNER_TEMP/quartus-evidence.XXXXXX")"
          echo "ARTIFACT_DIR=$artifact_dir" >> "$GITHUB_ENV"
          echo "EVIDENCE_DIR=$evidence_dir" >> "$GITHUB_ENV"
      - name: Verify pinned Quartus image
        run: ./scripts/quartus_docker.sh check-image
      - name: Fit and audit exact commit
        id: fit
        continue-on-error: ${{ inputs.profile == 'connectivity-refresh' }}
        run: ./scripts/quartus_docker.sh build "$ARTIFACT_DIR"
      - name: Collect bounded Quartus evidence
        id: collect
        if: ${{ always() && env.ARTIFACT_DIR != '' && env.EVIDENCE_DIR != '' }}
        run: >-
          python3 scripts/quartus_evidence.py
          --profile "${{ inputs.profile }}"
          --artifacts "$ARTIFACT_DIR"
          --output "$EVIDENCE_DIR"
      - name: Audit refresh build except exact connectivity policy drift
        id: refresh_audit
        if: >-
          ${{
            inputs.profile == 'connectivity-refresh' &&
            steps.collect.outcome == 'success' &&
            env.ARTIFACT_DIR != ''
          }}
        run: >-
          python3 scripts/quartus_connectivity_refresh_gate.py
          --artifacts "$ARTIFACT_DIR"
          --source-root "$GITHUB_WORKSPACE"
          --policy toolchains/quartus-21.1.1/connectivity-warning-12241.json
      - name: Prepare connectivity policy refresh drafts
        id: refresh_draft
        if: >-
          ${{
            inputs.profile == 'connectivity-refresh' &&
            steps.collect.outcome == 'success' &&
            steps.refresh_audit.outcome == 'success' &&
            env.ARTIFACT_DIR != '' &&
            env.EVIDENCE_DIR != ''
          }}
        shell: bash
        run: |
          set -euo pipefail
          readonly baseline="toolchains/quartus-21.1.1/connectivity-warning-12241.json"
          readonly metadata="$ARTIFACT_DIR/build-metadata.txt"
          readonly map_report="$ARTIFACT_DIR/output_files/ap_core.map.rpt"
          for required in "$baseline" "$metadata" "$map_report"; do
            if [[ ! -f "$required" || -L "$required" || ! -s "$required" ]]; then
              echo "connectivity refresh requires successful-build evidence: $required" >&2
              exit 1
            fi
          done
          if ! grep -Fx "source_commit=$GITHUB_SHA" "$metadata" >/dev/null; then
            echo "connectivity refresh build metadata does not bind GITHUB_SHA" >&2
            exit 1
          fi
          baseline_sha256="$(sha256sum "$baseline" | awk '{print $1}')"
          map_sha256="$(sha256sum "$map_report" | awk '{print $1}')"
          if [[ ! "$baseline_sha256" =~ ^[0-9a-f]{64}$ ]] \
              || [[ ! "$map_sha256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "connectivity refresh could not compute exact evidence hashes" >&2
            exit 1
          fi
          python3 scripts/quartus_connectivity_policy_refresh.py \
            --source-root "$GITHUB_WORKSPACE" \
            --policy "$baseline" \
            --baseline-policy-sha256 "$baseline_sha256" \
            --report "$map_report" \
            --build-metadata "$metadata" \
            --reviewed-source-commit "$GITHUB_SHA" \
            --reviewed-workflow-run-id "$GITHUB_RUN_ID" \
            --reviewed-map-report-sha256 "$map_sha256" \
            --output-policy "$EVIDENCE_DIR/connectivity-warning-12241.draft.json" \
            --output-allowlist "$EVIDENCE_DIR/connectivity-warning-12241.draft.tsv"
      - name: Validate exact bounded connectivity refresh bundle
        id: refresh_bundle
        if: >-
          ${{
            inputs.profile == 'connectivity-refresh' &&
            steps.refresh_draft.outcome == 'success' &&
            env.EVIDENCE_DIR != ''
          }}
        run: >-
          python3 scripts/quartus_evidence.py
          --validate-connectivity-refresh-bundle "$EVIDENCE_DIR"
      - name: Preserve bounded Quartus evidence
        if: >-
          ${{
            always() &&
            steps.collect.outcome == 'success' &&
            env.EVIDENCE_DIR != '' &&
            (inputs.profile == 'candidate' ||
              steps.refresh_bundle.outcome == 'success')
          }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quartus-${{ inputs.profile == 'candidate' && 'fit' || 'connectivity-refresh' }}-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: warn
          retention-days: 14
