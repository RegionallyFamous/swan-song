name: "Question"
description: "Ask a question about the project."
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Search [existing Swan Song issues](https://github.com/RegionallyFamous/swan-song/issues) before asking a new question.

  - type: textarea
    id: question
    attributes:
      label: Ask a question
      placeholder: |
        Ask your question here! Please keep the questions related to the core only.
    validations:
      required: true
